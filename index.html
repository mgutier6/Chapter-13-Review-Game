<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🔥 Mario Stats Kart - Lane AI</title>
<style>
body { margin:0; overflow:hidden; font-family:sans-serif; }
#timerBoard { position:absolute; top:10px; left:50%; transform:translateX(-50%); font-size:24px; background:rgba(255,255,255,0.8); padding:10px 20px; border-radius:12px; z-index:10;}
#questionPanel { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(255,255,255,0.95); padding:20px; border-radius:15px; display:none; z-index:20; max-width:500px; text-align:center;}
#questionPanel button { margin:5px; padding:10px 20px; font-size:16px; }
#startScreen { position:absolute; top:0; left:0; width:100%; height:100%; background:url('start_background.png') center/cover no-repeat; color:white; display:flex; flex-direction:column; justify-content:center; align-items:center; font-size:48px; z-index:30; }
#startScreen button { font-size:32px; padding:15px 30px; margin-top:20px; cursor:pointer; }
#highScores { position:absolute; top:0; right:0; width:300px; background:rgba(255,255,255,0.9); padding:10px; border-radius:12px; z-index:10; max-height:80vh; overflow:auto;}
canvas { display:block; }
</style>
</head>
<body>

<div id="startScreen">
  Chapter 13 Review
  <button id="startButton" disabled>Start</button>
</div>

<div id="timerBoard">Time: 0s</div>
<div id="questionPanel">
  <div id="questionText"></div>
  <div id="answerButtons"></div>
</div>

<div id="highScores"><h3>High Scores</h3><ol id="scoreList"></ol></div>

<audio id="bgMusic" loop>
  <source src="background.mp3" type="audio/mpeg">
</audio>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let gamePaused = false;
let gameStarted = false;
let startTime, elapsedTime = 0;
const baseSpeed = 2.2;

const trackLength = 20000;
const laneCount = 4;
const laneHeight = canvas.height / (laneCount + 1);
let cameraX = 0;

// Load images
const images = {};
const imageList = ['track_background.png','mario.png','luigi.png','peach.png','yoshi.png','lucky_block.png','obstacle.png'];
let imagesLoaded = 0;

imageList.forEach(src => {
  const img = new Image();
  img.src = src;
  img.onload = () => { imagesLoaded++; if(imagesLoaded===imageList.length) document.getElementById('startButton').disabled=false; }
  images[src] = img;
});

// Player
const player = {x:100, lane:1, yOffset:0, width:40, height:40, speed:baseSpeed, avatarImg:'mario.png'};

// AI drivers
const aiDrivers = [
  {lane:0, x:150, width:40, height:40, speed:baseSpeed, yOffset:0, img:'luigi.png'},
  {lane:2, x:200, width:40, height:40, speed:baseSpeed, yOffset:0, img:'peach.png'},
  {lane:3, x:250, width:40, height:40, speed:baseSpeed, yOffset:0, img:'yoshi.png'}
];

// Questions (unchanged)
const questions = [
  {q:"Why do sample proportions vary from sample to sample?", a:"Due to random sampling variability.", options:["Due to random sampling variability.","Always same","Depends on n"]},
  {q:"What is the Randomization Condition?", a:"The sample must be randomly selected.", options:["The sample must be randomly selected.","Population small","Sample >10%"]},
  {q:"What is the 10% Condition?", a:"The sample size must be less than 10% of the population.", options:["Sample <10%","Sample >50%","Sample = population"]},
  {q:"Randomization Condition?", a:"The sample must be randomly selected.", options:["The sample must be randomly selected.","Population small","Sample >10%"]},
  {q:"What shape does the sampling distribution of p^ have?", a:"Approximately normal (if conditions are met).", options:["Approximately normal","Skewed","Uniform"]},
  {q:"What does p represent?", a:"The true population proportion.", options:["The true population proportion.","Sample proportion","Parameter"]},
  {q:"Parameter vs Statistic?", a:"A parameter describes a population, while a statistic describes a sample.", options:["Parameter describes population, Statistic describes sample","Both same","Parameter=sample, Statistic=population"]},
  {q:"What does p^ represent?", a:"The sample proportion.", options:["Sample proportion","Population proportion","Variance"]},
  {q:"What does q equal in proportion problems?", a:"q = 1 - p", options:["q = 1 - p","p - 1","p^2"]},
  {q:"True or False: Larger samples give more accurate estimates.", a:"True.", options:["True","False","Depends on population"]},
  {q:"What is sampling variability?", a:"The natural differences between sample results.", options:["Natural differences between samples","Random error","Bias"]},
  {q:"If p=0.5, what is the mean of the sampling distribution?", a:"0.5", options:["0.5","0.4","0.6"]},
  {q:"If n=10 vs n=100, which has more spread?", a:"n=10 (smaller samples have more variability).", options:["n=10","n=100","Same"]},
  {q:"Which condition is most important for using a normal model?", a:"Success/Failure condition", options:["Success/Failure condition","Randomization condition","10% condition"]}
];

// Blocks and Obstacles
let blocks = [], obstacles=[];
for(let i=0;i<questions.length*2;i++){
  const spacing = 500 + i*1000 + Math.random()*200;
  blocks.push({x:spacing, lane:player.lane, width:30, height:30, hit:false, questionIndex:i%questions.length});
}
for(let l=0;l<laneCount;l++){
  for(let i=0;i<25;i++){
    const x = 400 + i*500 + Math.random()*150;
    obstacles.push({x, lane:l, width:30, height:30, yOffset:0});
  }
}

// Controls
const keys = {};
window.addEventListener('keydown',e=>keys[e.key]=true);
window.addEventListener('keyup',e=>keys[e.key]=false);

// Timer
function updateTimer(){ if(gameStarted&&!gamePaused){ elapsedTime=((Date.now()-startTime)/1000).toFixed(2); document.getElementById('timerBoard').innerText=`Time: ${elapsedTime}s`; }}

// Collision
function isColliding(a,b){ const aY=a.lane*laneHeight+laneHeight/2+(a.yOffset||0)-a.height/2; const bY=b.lane*laneHeight+laneHeight/2+(b.yOffset||0)-b.height/2; return a.x < b.x+b.width && a.x+a.width > b.x && aY < bY+b.height && aY + a.height > bY;}

// Question panel
const questionPanel=document.getElementById('questionPanel');
const questionText=document.getElementById('questionText');
const answerButtons=document.getElementById('answerButtons');
function applyPowerup(correct, correctAnswer){
  if(correct){ 
    if(Math.random()<0.5){ player.speed*=1.5; alert("Correct! Speed boost!"); setTimeout(()=>player.speed=baseSpeed,3000);} 
    else { aiDrivers.forEach(ai=>ai.speed=baseSpeed*0.5); alert("Correct! AI slowed down!"); setTimeout(()=>aiDrivers.forEach(ai=>ai.speed=baseSpeed),3000);} 
  } else { 
    aiDrivers.forEach(ai=>ai.speed=baseSpeed*1.5); alert("Wrong! Correct answer: "+correctAnswer); setTimeout(()=>aiDrivers.forEach(ai=>ai.speed=baseSpeed),3000);
  }
}
function askQuestion(block){ 
  gamePaused=true; 
  const q=questions[block.questionIndex]; 
  questionText.innerText=q.q; 
  answerButtons.innerHTML=''; 
  q.options.forEach(opt=>{ 
    const btn=document.createElement('button'); 
    btn.innerText=opt; 
    btn.onclick=()=>{ 
      questionPanel.style.display='none'; 
      block.hit=true; 
      applyPowerup(opt===q.a,q.a); 
      gamePaused=false;
    } 
    answerButtons.appendChild(btn); 
  }); 
  questionPanel.style.display='block';
}

// Player & AI movement
function movePlayerLane(){ 
  const maxOffset=laneHeight/2-player.height/2; 
  if(keys['ArrowUp']){ let nextY=player.yOffset-player.speed; if(!obstacles.some(obs=>obs.lane===player.lane && isColliding({...player,yOffset:nextY},obs))) player.yOffset=Math.max(-maxOffset,nextY);} 
  if(keys['ArrowDown']){ let nextY=player.yOffset+player.speed; if(!obstacles.some(obs=>obs.lane===player.lane && isColliding({...player,yOffset:nextY},obs))) player.yOffset=Math.min(maxOffset,nextY);} 
}
function moveAI(ai){ 
  const maxOffset=laneHeight/2-ai.height/2; 
  let nextX=ai.x+ai.speed; 
  let blocked=obstacles.some(obs=>obs.lane===ai.lane && isColliding({...ai,x:nextX},obs)); 
  if(!blocked) ai.x=nextX; 
  else { 
    if(ai.yOffset-ai.speed>=-maxOffset && !obstacles.some(obs=>obs.lane===ai.lane && isColliding({...ai,x:ai.x,yOffset:ai.yOffset-ai.speed},obs))) ai.yOffset-=ai.speed; 
    else if(ai.yOffset+ai.speed<=maxOffset && !obstacles.some(obs=>obs.lane===ai.lane && isColliding({...ai,x:ai.x,yOffset:ai.yOffset+ai.speed},obs))) ai.yOffset+=ai.speed; 
    else ai.x+=ai.speed*0.5;
  }
}

// Draw
function drawLaneLines(){ ctx.strokeStyle='white'; ctx.lineWidth=2; for(let l=1;l<laneCount;l++){ ctx.beginPath(); ctx.moveTo(0,l*laneHeight); ctx.lineTo(canvas.width,l*laneHeight); ctx.stroke();}}
function loop(){
  if(!gameStarted) return;
  updateTimer();
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if(!gamePaused){
    movePlayerLane(); cameraX=player.x-200;
    for(let i=0;i<trackLength;i+=images['track_background.png'].width) ctx.drawImage(images['track_background.png'],i-cameraX,0,images['track_background.png'].width,canvas.height);
    drawLaneLines();
    obstacles.forEach(obs=>ctx.drawImage(images['obstacle.png'],obs.x-cameraX,obs.lane*laneHeight+laneHeight/2-obs.height/2,obs.width,obs.height));
    blocks.forEach(block=>{ 
      if(!block.hit){ 
        ctx.drawImage(images['lucky_block.png'],block.x-cameraX,block.lane*laneHeight+laneHeight/2-block.height/2,block.width,block.height); 
        if(isColliding(player,block)) askQuestion(block);
      }
    });
    aiDrivers.forEach(ai=>{ moveAI(ai); ctx.drawImage(images[ai.img],ai.x-cameraX,ai.lane*laneHeight+laneHeight/2+ai.yOffset-ai.height/2,ai.width,ai.height);});
    let nextX=player.x+player.speed; if(!obstacles.some(obs=>obs.lane===player.lane && isColliding({...player,x:nextX},obs))) player.x=nextX;
    ctx.drawImage(images[player.avatarImg],player.x-cameraX,player.lane*laneHeight+laneHeight/2+player.yOffset-player.height/2,player.width,player.height);
    if(player.x+player.width>=trackLength-100) finalScreen();
  }
  requestAnimationFrame(loop);
}

// High Scores
function saveHighScore(name,time){ let scores=JSON.parse(localStorage.getItem('highScores')||'[]'); scores.push({name,time:parseFloat(time)}); scores.sort((a,b)=>a.time-b.time); localStorage.setItem('highScores',JSON.stringify(scores)); displayHighScores();}
function displayHighScores(){ const scoreList=document.getElementById('scoreList'); scoreList.innerHTML=''; const scores=JSON.parse(localStorage.getItem('highScores')||'[]'); scores.forEach(s=>{ const li=document.createElement('li'); li.innerText=`${s.name}: ${s.time}s`; scoreList.appendChild(li);});}

// Final
function finalScreen(){ gamePaused=true; let name=prompt(`You finished in ${elapsedTime}s! Enter your name:`); if(name) saveHighScore(name,elapsedTime); location.reload();}

// Start
document.getElementById('startButton').onclick=()=>{ 
  gameStarted=true; 
  startTime=Date.now(); 
  document.getElementById('bgMusic').play(); 
  document.getElementById('startScreen').style.display='none'; 
  loop(); 
  displayHighScores();
};
</script>
</body>
</html>
