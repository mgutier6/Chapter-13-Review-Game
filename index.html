<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎈 Balloon Pop Stats Game!</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(to top, #87cefa, #ffebcd);
    }

    #scoreboard {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 24px;
      font-weight: bold;
      color: #333;
      background: rgba(255,255,255,0.7);
      padding: 10px 20px;
      border-radius: 12px;
    }

    .balloon {
      position: absolute;
      padding: 10px 20px;
      background: radial-gradient(circle at 30% 30%, #ff6666, #cc0000);
      border-radius: 50%;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
      user-select: none;
      animation: floatUp linear;
    }

    @keyframes floatUp {
      0% { transform: translateY(100vh); }
      100% { transform: translateY(-100px); }
    }

    .pop {
      animation: popAnim 0.3s forwards;
    }

    @keyframes popAnim {
      0% { transform: scale(1); opacity: 1; }
      100% { transform: scale(2); opacity: 0; }
    }

    .confetti {
      position: absolute;
      width: 8px;
      height: 8px;
      background-color: #ffdd57;
      animation: fall 2s linear forwards;
    }

    @keyframes fall {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
    }
  </style>
</head>
<body>
  <div id="scoreboard">Score: 0 | Lives: 3</div>

  <script>
    const questions = [
      {q: "Why do sample proportions vary from sample to sample?", a: "Random sampling variability"},
      {q: "Randomization Condition?", a: "Sample randomly selected"},
      {q: "10% Condition?", a: "Sample <10% population"},
      {q: "Sampling distribution of p^ shape?", a: "Approximately normal"},
      {q: "p represents?", a: "True population proportion"},
      {q: "Parameter vs Statistic?", a: "Parameter=population, Statistic=sample"},
      {q: "p^ represents?", a: "Sample proportion"},
      {q: "q = ?", a: "1 - p"},
      {q: "Larger samples more accurate?", a: "True"},
      {q: "Sampling variability?", a: "Natural differences between samples"},
      {q: "p=0.5 mean of sampling distribution?", a: "0.5"},
      {q: "n=10 vs n=100 more spread?", a: "n=10"},
      {q: "Most important for normal model?", a: "Success/Failure condition"}
    ];

    let score = 0;
    let lives = 3;

    function updateScoreboard() {
      document.getElementById('scoreboard').innerText = `Score: ${score} | Lives: ${lives}`;
    }

    function launchConfetti(x, y){
      for(let i=0;i<20;i++){
        const c = document.createElement('div');
        c.className='confetti';
        c.style.left = x + 'px';
        c.style.top = y + 'px';
        c.style.backgroundColor = `hsl(${Math.random()*360},100%,50%)`;
        document.body.appendChild(c);
        setTimeout(()=>c.remove(), 2000);
      }
    }

    function spawnBalloon() {
      if(lives <= 0) return;

      const balloon = document.createElement('div');
      balloon.className = 'balloon';

      // Pick random question and 1 correct + 2 wrong answers
      const qIndex = Math.floor(Math.random()*questions.length);
      const question = questions[qIndex];
      const answers = [question.a];

      while(answers.length<3){
        const r = questions[Math.floor(Math.random()*questions.length)].a;
        if(!answers.includes(r)) answers.push(r);
      }

      balloon.innerText = answers[Math.floor(Math.random()*answers.length)];
      balloon.style.left = Math.random()*(window.innerWidth-100) + 'px';
      balloon.style.animationDuration = (5+Math.random()*3) + 's';

      document.body.appendChild(balloon);

      balloon.onclick = () => {
        if(balloon.innerText === question.a){
          score++;
          updateScoreboard();
          balloon.classList.add('pop');
          launchConfetti(parseInt(balloon.style.left), window.innerHeight*0.8);
          setTimeout(()=>balloon.remove(),300);
        } else {
          lives--;
          updateScoreboard();
          balloon.style.transform = "translateX(-10px)";
          setTimeout(()=>balloon.style.transform="", 100);
          if(lives<=0){
            alert(`Game Over! Final Score: ${score}`);
            location.reload();
          }
        }
      };

      // Remove balloon after it floats off screen
      balloon.addEventListener('animationend', ()=>{
        if(document.body.contains(balloon)) {
          balloon.remove();
          if(lives>0) spawnBalloon(); // keep the game going
        }
      });

      // spawn next balloon randomly after 0.5–1.5s
      setTimeout(spawnBalloon, 500+Math.random()*1000);
    }

    updateScoreboard();
    spawnBalloon();
  </script>
</body>
</html>
