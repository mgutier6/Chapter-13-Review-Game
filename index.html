<html lang="en">

<style>
body { margin:0; overflow:hidden; font-family:sans-serif; background:#87cefa; }

#timerBoard {
  position:absolute; top:10px; left:50%;

}

#questionPanel {

  display:none; z-index:20;
  max-width:500px; text-align:center;
}

#questionPanel button {
  margin:5px; padding:10px 20px; font-size:16px;
}

#startScreen {
  position:absolute; top:0; left:0;
  width:100%; height:100%;
  background:url('start_background.png') center/cover no-repeat;
  color:white;
  display:flex; flex-direction:column;
  justify-content:center; align-items:center;
  font-size:48px; z-index:30;
  text-shadow:2px 2px 8px black;
}

#startScreen button {
  font-size:32px; padding:15px 30px;
  margin-top:20px; cursor:pointer;
}

#highScores {
  position:absolute; top:0; right:0;
  width:300px; background:rgba(255,255,255,0.9);
  padding:10px; border-radius:12px;
  z-index:10; max-height:80vh; overflow:auto;
}

#avatarHint {
  position:absolute; bottom:0; width:100%;
  text-align:center; font-size:20px;
  background:rgba(255,255,255,0.7);
  padding:10px;
}

canvas { display:block; }
</style>
</head>
