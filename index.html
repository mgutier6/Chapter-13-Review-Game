<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🔥 Mario Stats Kart - Lane AI</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  body { margin:0; overflow:hidden; font-family:'Press Start 2P', cursive; background:#87cefa; }
  #timerBoard { position:absolute; top:10px; left:50%; transform:translateX(-50%); font-size:24px; background:rgba(255,255,255,0.8); padding:10px 20px; border-radius:12px; z-index:10;}
  #questionPanel { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:red; padding:20px; border-radius:10px; display:none; z-index:20; max-width:500px; text-align:center;}
  #questionPanel button { margin:5px; padding:10px 20px; font-size:16px; }
  #startScreen { position:absolute; top:0; left:0; width:100%; height:100%; background:#87cefa; color:white; display:flex; flex-direction:column; justify-content:center; align-items:center; font-size:48px; z-index:30; }
  #startScreen button { font-size:32px; padding:15px 30px; margin-top:20px; cursor:pointer; }
  #highScores { position:absolute; top:0; right:0; width:300px; background:rgba(255,255,255,0.9); padding:10px; border-radius:12px; z-index:10; max-height:80vh; overflow:auto;}
  canvas { display:block; }
</style>
</head>
<body>

<div id="startScreen">
  MARIO STATS KART
  <button id="startButton">Start</button>
</div>

<div id="timerBoard">Time: 0s</div>
<div id="questionPanel">
  <div id="questionText"></div>
  <div id="answerButtons"></div>
</div>

<div id="highScores"><h3>High Scores</h3><ol id="scoreList"></ol></div>

<audio id="bgMusic" loop>
  <source src="background.mp3" type="audio/mpeg">
</audio>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let gamePaused = false;
let gameStarted = false;
let startTime, elapsedTime = 0;
const baseSpeed = 2.5;

const trackLength = 20000;
const laneCount = 4;
const laneHeight = canvas.height / (laneCount + 1);
let cameraX = 0;

// Load images
const backgroundImg = new Image(); backgroundImg.src = "track_background.png";
const playerImg = new Image(); playerImg.src = "mario.png";
const aiImgs = [new Image(), new Image(), new Image()];
aiImgs[0].src = "luigi.png"; aiImgs[1].src = "peach.png"; aiImgs[2].src = "yoshi.png";
const luckyBlockImg = new Image(); luckyBlockImg.src = "lucky_block.png";

// Player
const player = {x:100, lane:1, yOffset:0, width:50, height:50, speed:baseSpeed, avatarImg:playerImg};

// AI drivers
const aiDrivers = [
  {lane:0, x:150, width:50, height:50, speed:baseSpeed, yOffset:0, img:aiImgs[0]},
  {lane:2, x:200, width:50, height:50, speed:baseSpeed, yOffset:0, img:aiImgs[1]},
  {lane:3, x:250, width:50, height:50, speed:baseSpeed, yOffset:0, img:aiImgs[2]}
];

// Questions
const questions = [
  {
    q: "Why do sample proportions vary from sample to sample?",
    a: "Due to random sampling variability",
    options: [
      "Because the population changes over time",
      "Due to measurement error",
      "Due to random sampling variability",
      "Because the sample size is always too small"
    ]
  },
  {
    q: "What is the Randomization Condition?",
    a: "The sample must be randomly selected",
    options: [
      "The sample must be randomly selected",
      "The population must be normally distributed",
      "The sample size must be at least 30",
      "The data must be categorical"
    ]
  },
  {
    q: "What is the 10% Condition?",
    a: "The sample size must be less than 10% of the population",
    options: [
      "The sample size must be at least 10% of the population",
      "The sample size must be less than 10% of the population",
      "Only 10% of the sample should vary",
      "10% of observations must be successes"
    ]
  },
  {
    q: "What shape does the sampling distribution of p^ have?",
    a: "Approximately normal (if conditions are met)",
    options: [
      "Skewed left",
      "Skewed right",
      "Approximately normal (if conditions are met)",
      "Uniform"
    ]
  },
  {
    q: "What does p represent?",
    a: "True population proportion",
    options: [
      "Sample proportion",
      "True population proportion",
      "Number of successes",
      "Sample mean"
    ]
  },
  {
    q: "What is the difference between a parameter and a statistic?",
    a: "A parameter describes a population, a statistic describes a sample",
    options: [
      "A parameter describes a sample, a statistic describes a population",
      "A parameter describes a population, a statistic describes a sample",
      "Both describe populations",
      "Both describe samples"
    ]
  },
  {
    q: "What does p^ represent?",
    a: "Sample proportion",
    options: [
      "True population proportion",
      "Sample proportion",
      "Number of successes in the population",
      "Number of successes in the sample"
    ]
  },
  {
    q: "What does q equal in proportion problems?",
    a: "q = 1 - p",
    options: [
      "q = p + 1",
      "q = 1 - p",
      "q = p / 2",
      "q = p^2"
    ]
  },
  {
    q: "True or False: Larger samples give more accurate estimates.",
    a: "True",
    options: [
      "True",
      "False"
    ]
  },
  {
    q: "What is sampling variability?",
    a: "The natural differences between sample results",
    options: [
      "Errors in data entry",
      "The natural differences between sample results",
      "A type of bias",
      "Differences between populations"
    ]
  },
  {
    q: "If p = 0.5, what is the mean of the sampling distribution?",
    a: "0.5",
    options: [
      "0",
      "0.25",
      "0.5",
      "1"
    ]
  },
  {
    q: "If n = 10 vs n = 100, which has more spread?",
    a: "n = 10",
    options: [
      "n = 100",
      "n = 10",
      "Both are the same",
      "Cannot determine"
    ]
  },
  {
    q: "Which condition is most important for using a normal model for proportions?",
    a: "Success/Failure Condition",
    options: [
      "Randomization Condition",
      "10% Condition",
      "Success/Failure Condition",
      "Sample size ≥ 5"
    ]
  },
  {
    q: "True or False: Larger samples give more accurate estimates.",
    a: "True",
    options: [
      "True",
      "False"
    ]
  }
];


// Lucky blocks
let blocks = [];
for(let i=0;i<questions.length*2;i++){
  const spacing = 500 + i*1200 + Math.random()*300;
  blocks.push({x:spacing, lane:player.lane, width:35, height:35, hit:false, questionIndex:i % questions.length});
}

// Obstacles (red squares, smaller)
let obstacles = [];
for(let l=0;l<laneCount;l++){
  for(let i=0;i<25;i++){
    const obsX = 400 + i*600 + Math.random()*200;
    const obsY = (Math.random()*(laneHeight-25))-(laneHeight/2-12);
    obstacles.push({x:obsX, lane:l, width:25, height:25, yOffset:obsY});
  }
}

// Controls
const keys = {};
window.addEventListener('keydown', e=>keys[e.key]=true);
window.addEventListener('keyup', e=>keys[e.key]=false);

// Timer
function updateTimer(){
  if(gameStarted && !gamePaused){
    elapsedTime = ((Date.now()-startTime)/1000).toFixed(2);
    document.getElementById('timerBoard').innerText = `Time: ${elapsedTime}s`;
  }
}

// Collision detection
function isColliding(a,b){ 
  const aY = a.lane*laneHeight + laneHeight/2 + (a.yOffset||0) - a.height/2;
  const bY = b.lane*laneHeight + laneHeight/2 + (b.yOffset||0) - b.height/2;
  return a.x < b.x + b.width && a.x + a.width > b.x && aY < bY + b.height && aY + a.height > bY;
}

// Question UI
const questionPanel = document.getElementById('questionPanel');
const questionText = document.getElementById('questionText');
const answerButtons = document.getElementById('answerButtons');

function applyPowerup(correct, correctAnswer){
  if(correct){
    if(Math.random()<0.5){
      player.speed *= 1.5;
      alert("Correct! Speed boost!");
      setTimeout(()=>player.speed=baseSpeed,3000);
    } else {
      aiDrivers.forEach(ai=>ai.speed=baseSpeed*0.5);
      alert("Correct! AI slowed down!");
      setTimeout(()=>aiDrivers.forEach(ai=>ai.speed=baseSpeed),3000);
    }
  } else {
    aiDrivers.forEach(ai=>ai.speed=baseSpeed*1.5);
    alert("Wrong! Correct answer: " + correctAnswer);
    setTimeout(()=>aiDrivers.forEach(ai=>ai.speed=baseSpeed),3000);
  }
}

function askQuestion(block){
  gamePaused = true;
  const q = questions[block.questionIndex];
  questionText.innerText = q.q;
  answerButtons.innerHTML = '';
  q.options.forEach(opt=>{
    const btn = document.createElement('button');
    btn.innerText = opt;
    btn.onclick = ()=>{
      questionPanel.style.display='none';
      block.hit=true;
      applyPowerup(opt===q.a, q.a);
      gamePaused=false;
    }
    answerButtons.appendChild(btn);
  });
  questionPanel.style.display='block';
}

// Player movement
function movePlayerLane(){
  const maxOffset = laneHeight/2 - player.height/2;
  if(keys['ArrowUp']) { 
    let nextY = player.yOffset - player.speed;
    if(!obstacles.some(obs=>obs.lane===player.lane && isColliding({...player,yOffset:nextY}, obs))){
      player.yOffset = Math.max(-maxOffset, nextY); 
    }
  }
  if(keys['ArrowDown']) { 
    let nextY = player.yOffset + player.speed;
    if(!obstacles.some(obs=>obs.lane===player.lane && isColliding({...player,yOffset:nextY}, obs))){
      player.yOffset = Math.min(maxOffset, nextY); 
    }
  }
}

// AI movement
function moveAI(ai){
  const maxOffset = laneHeight/2 - ai.height/2;
  let nextX = ai.x + ai.speed;
  let blocked = obstacles.some(obs=>obs.lane===ai.lane && isColliding({...ai,x:nextX}, obs));

  if(!blocked) ai.x = nextX;
  else {
    let moveUp = Math.random()>0.5;
    if(moveUp && ai.yOffset - ai.speed >= -maxOffset && !obstacles.some(obs=>obs.lane===ai.lane && isColliding({...ai,yOffset:ai.yOffset - ai.speed}, obs))) ai.yOffset -= ai.speed;
    else if(!moveUp && ai.yOffset + ai.speed <= maxOffset && !obstacles.some(obs=>obs.lane===ai.lane && isColliding({...ai,yOffset:ai.yOffset + ai.speed}, obs))) ai.yOffset += ai.speed;
    else ai.x += ai.speed*0.5;
  }
}

// Draw lanes
function drawLaneLines(){
  ctx.strokeStyle='white';
  ctx.lineWidth=2;
  for(let l=1;l<laneCount;l++){
    ctx.beginPath();
    ctx.moveTo(0,l*laneHeight);
    ctx.lineTo(canvas.width,l*laneHeight);
    ctx.stroke();
  }
}

// High scores
function saveHighScore(name,time){
  let scores = JSON.parse(localStorage.getItem('highScores')||'[]');
  scores.push({name:name,time:parseFloat(time)});
  scores.sort((a,b)=>a.time-b.time);
  localStorage.setItem('highScores',JSON.stringify(scores));
  displayHighScores();
}
function displayHighScores(){
  const scoreList = document.getElementById('scoreList');
  scoreList.innerHTML='';
  const scores = JSON.parse(localStorage.getItem('highScores')||'[]');
  scores.forEach(s=>{
    const li = document.createElement('li');
    li.innerText = `${s.name}: ${s.time}s`;
    scoreList.appendChild(li);
  });
}

// Main game loop
function loop(){
  if(!gameStarted) return;
  updateTimer();
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(!gamePaused){
    movePlayerLane();
    cameraX = player.x - 200;

    if(backgroundImg.complete){
      for(let i=0;i<trackLength;i+=backgroundImg.width){
        ctx.drawImage(backgroundImg,i - cameraX,0,backgroundImg.width,canvas.height);
      }
    }

    drawLaneLines();

    // Draw obstacles (red squares)
    obstacles.forEach(obs=>{
      ctx.fillStyle='red';
      ctx.fillRect(obs.x-cameraX, obs.lane*laneHeight + laneHeight/2 + obs.yOffset - obs.height/2, obs.width, obs.height);
    });

    // Draw lucky blocks
    blocks.forEach(block=>{
      if(!block.hit){
        ctx.drawImage(luckyBlockImg, block.x-cameraX, block.lane*laneHeight + laneHeight/2 - block.height/2, block.width, block.height);
        if(isColliding(player,block)) askQuestion(block);
      }
    });

    // Move & draw AI
    aiDrivers.forEach(ai=>{
      moveAI(ai);
      ctx.drawImage(ai.img, ai.x - cameraX, ai.lane*laneHeight + laneHeight/2 + ai.yOffset - ai.height/2, ai.width, ai.height);
    });

    // Move player forward
    let nextX = player.x + player.speed;
    if(!obstacles.some(obs=>obs.lane===player.lane && isColliding({...player,x:nextX}, obs))) player.x = nextX;

    // Draw player
    ctx.drawImage(player.avatarImg, player.x-cameraX, player.lane*laneHeight + laneHeight/2 + player.yOffset - player.height/2, player.width, player.height);

    // Finish line
    if(player.x + player.width >= trackLength - 100){
      ctx.fillStyle='white';
      ctx.fillRect(trackLength - 100 - cameraX,0,20,canvas.height);
      finalScreen();
    }
  }

  requestAnimationFrame(loop);
}

// Final screen
function finalScreen(){
  gamePaused = true;
  let name = prompt(`You finished in ${elapsedTime}s! Enter your name for high scores:`);
  if(name) saveHighScore(name,elapsedTime);
  location.reload();
}

// Start button
document.getElementById('startButton').onclick = ()=>{
  gameStarted = true;
  startTime = Date.now();
  document.getElementById('bgMusic').play();
  document.getElementById('startScreen').style.display='none';
  displayHighScores();
  loop();
}

displayHighScores();
</script>

</body>
</html>
