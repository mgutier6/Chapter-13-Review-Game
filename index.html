<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🎉 Mario Stats Kart Prototype</title>
<style>
  body {margin:0; overflow:hidden; background:#7ec0ee; font-family:sans-serif;}
  canvas {display:block; background:#87cefa;}
  #scoreboard {position:absolute; top:10px; left:50%; transform:translateX(-50%); font-size:24px; background:rgba(255,255,255,0.8); padding:10px 20px; border-radius:12px;}
</style>
</head>
<body>
<div id="scoreboard">Score: 0 | Power-ups: 0</div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let score = 0, powerups = 0;

// Player
const player = {x:100, y:canvas.height-100, width:50, height:50, color:'red', speed:5};

// AI drivers
const aiDrivers = [
  {x:150, y:canvas.height-100, width:50, height:50, color:'blue', speed:2},
  {x:200, y:canvas.height-100, width:50, height:50, color:'green', speed:2.2},
  {x:250, y:canvas.height-100, width:50, height:50, color:'purple', speed:2.5}
];

// Lucky blocks
const questions = [
  {q:"Why do sample proportions vary?", a:"Random sampling variability", options:["Random sampling variability","Always same","Depends on n"]},
  {q:"Randomization Condition?", a:"Sample randomly selected", options:["Random sample","Population small","Sample >10%"]},
  {q:"10% Condition?", a:"Sample <10% population", options:["Sample <10%","Sample >50%","Sample = population"]},
  {q:"Sampling distribution shape?", a:"Approximately normal", options:["Approximately normal","Skewed","Uniform"]}
];

let blocks = [];
for(let i=0;i<5;i++){
  blocks.push({x:300+i*400, y:canvas.height/2 + (Math.random()*200-100), width:50, height:50, hit:false});
}

// Controls
const keys = {};
window.addEventListener('keydown', e=>keys[e.key]=true);
window.addEventListener('keyup', e=>keys[e.key]=false);

// Update scoreboard
function updateScoreboard(){ document.getElementById('scoreboard').innerText = `Score: ${score} | Power-ups: ${powerups}`; }

// Collision detection
function isColliding(a,b){ return a.x < b.x + b.width && a.x + a.width > b.x && a.y < b.y + b.height && a.y + a.height > b.y; }

// Main game loop
function loop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // Move player
  if(keys['ArrowUp']) player.y -= player.speed;
  if(keys['ArrowDown']) player.y += player.speed;
  if(keys['ArrowLeft']) player.x -= player.speed;
  if(keys['ArrowRight']) player.x += player.speed;

  // Keep in bounds
  player.x = Math.max(0, Math.min(canvas.width-player.width, player.x));
  player.y = Math.max(0, Math.min(canvas.height-player.height, player.y));

  // Draw player
  ctx.fillStyle = player.color;
  ctx.fillRect(player.x, player.y, player.width, player.height);

  // Move and draw AI
  aiDrivers.forEach(ai=>{
    ai.x += ai.speed;
    ctx.fillStyle=ai.color;
    ctx.fillRect(ai.x, ai.y, ai.width, ai.height);
  });

  // Draw blocks
  blocks.forEach(block=>{
    if(!block.hit){
      ctx.fillStyle='gold';
      ctx.fillRect(block.x, block.y, block.width, block.height);
      // Check collision
      if(isColliding(player,block)){
        block.hit = true;
        askQuestion();
      }
    }
  });

  // Draw finish line
  const finishX = 3000;
  ctx.fillStyle='black';
  ctx.fillRect(finishX,0,20,canvas.height);

  // Check finish
  if(player.x + player.width >= finishX){
    finalBoss();
    return;
  }

  requestAnimationFrame(loop);
}

// Multiple choice question
function askQuestion(){
  const qIndex = Math.floor(Math.random()*questions.length);
  const q = questions[qIndex];

  let choices = '';
  q.options.forEach((o,i)=> choices += `${i+1}: ${o}\n`);
  let ans = prompt(q.q + "\n" + choices);
  if(ans && q.options[parseInt(ans)-1]===q.a){
    score++;
    powerups++;
    alert("Correct! You got a power-up 🎉");
  } else {
    alert("Wrong! No power-up 😢");
  }
  updateScoreboard();
}

// Final boss
function finalBoss(){
  const finalQ = "Final Boss! Solve p^ = ? for n=10, p=0.5\n1: 0.5\n2: 0.4\n3: 0.6";
  let ans = prompt(finalQ);
  if(ans==='1'){
    alert("You saved the princess! 🎉🏁 Final Score: "+score);
  } else {
    alert("Game Over! Final Score: "+score);
  }
  location.reload();
}

loop();
</script>
</body>
</html>
