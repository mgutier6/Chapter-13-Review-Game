<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🔥 Mario Stats Kart</title>
<style>
body { margin:0; overflow:hidden; font-family:sans-serif; }
#startScreen {
  position:absolute; width:100%; height:100%;
  display:flex; flex-direction:column;
  justify-content:center; align-items:center;
  background:url('start_background.png') center/cover;
  color:white; font-size:50px; z-index:10;
}
#startScreen button { font-size:30px; padding:15px 30px; }

#timerBoard {
  position:absolute; top:10px; left:50%;
  transform:translateX(-50%);
  background:white; padding:10px 20px;
  border-radius:10px;
}

#questionPanel {
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
  display:none; z-index:20;
  background:url('question_background.png') center/cover;
  padding:20px; border-radius:15px;
}
#questionPanel button { margin:5px; padding:10px; }

canvas { display:block; }
</style>
</head>
<body>

<div id="startScreen">
  <div>Chapter 13 Review</div>
  <button id="startBtn">Start</button>
</div>

<div id="timerBoard">Time: 0</div>

<div id="questionPanel">
  <div id="questionText"></div>
  <div id="answers"></div>
</div>

<audio id="music" loop src="background.mp3"></audio>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const laneCount = 4;
const laneHeight = canvas.height / (laneCount+1);
const baseSpeed = 3.5;
const trackLength = 20000;

let cameraX = 0;
let gameStarted=false;
let gamePaused=false;
let startTime;

// PLAYER
const player = {
  x:100, lane:1, yOffset:0,
  width:50, height:50,
  speed:baseSpeed
};

// AI
const aiDrivers = [
  {lane:0,x:150,yOffset:0,width:50,height:50,speed:baseSpeed},
  {lane:2,x:200,yOffset:0,width:50,height:50,speed:baseSpeed},
  {lane:3,x:250,yOffset:0,width:50,height:50,speed:baseSpeed}
];

// QUESTIONS
const questions = [
  {q:"Why do sample proportions vary?", a:"Due to random sampling variability.", options:["Due to random sampling variability.","Always same","Depends on n"]},
  {q:"Randomization Condition?", a:"Sample randomly selected", options:["Sample randomly selected","Sample large","Population small"]},
  {q:"10% Condition?", a:"Sample <10%", options:["Sample <10%","Sample >50%","Any sample"]},
  {q:"Sampling distribution shape?", a:"Approximately normal", options:["Approximately normal","Uniform","Skewed"]},
];

// OBSTACLES
const obstacles=[];
for(let i=500;i<trackLength;i+=600){
  for(let l=0;l<laneCount;l++){
    if(Math.random()<0.3){
      obstacles.push({
        x:i+Math.random()*200,
        lane:l,
        width:50,height:50,
        yOffset:(Math.random()-0.5)*80
      });
    }
  }
}

// LUCKY BLOCKS (PLAYER ONLY)
const blocks=[];
for(let i=800;i<trackLength;i+=1200){
  blocks.push({x:i,lane:player.lane,width:40,height:40});
}

// CONTROLS
const keys={};
onkeydown=e=>keys[e.key]=true;
onkeyup=e=>keys[e.key]=false;

// QUESTION SYSTEM
function askQuestion(callback){
  gamePaused=true;
  const q = questions[Math.floor(Math.random()*questions.length)];
  document.getElementById('questionText').innerText=q.q;
  const ansDiv=document.getElementById('answers');
  ansDiv.innerHTML="";

  q.options.forEach(opt=>{
    const btn=document.createElement('button');
    btn.innerText=opt;
    btn.onclick=()=>{
      document.getElementById('questionPanel').style.display='none';
      gamePaused=false;

      if(opt===q.a){
        if(Math.random()<0.5){
          player.speed=baseSpeed*1.5;
          alert("🔥 Speed Boost!");
        } else {
          aiDrivers.forEach(ai=>ai.speed=baseSpeed*0.6);
          alert("🐢 AI Slowed!");
        }
      } else {
        aiDrivers.forEach(ai=>ai.speed=baseSpeed*1.5);
        alert("💀 AI BOOSTED!");
      }

      setTimeout(()=>{
        player.speed=baseSpeed;
        aiDrivers.forEach(ai=>ai.speed=baseSpeed);
      },3000);

      callback();
    };
    ansDiv.appendChild(btn);
  });

  document.getElementById('questionPanel').style.display='block';
}

// ---------- ULTRA SMART AI ----------
function updateAI(){
  aiDrivers.forEach(ai=>{
    const maxOffset = laneHeight/2 - ai.height/2;
    const lookAhead = 200;

    const upcoming = obstacles.filter(o =>
      o.lane===ai.lane && o.x>ai.x && o.x<ai.x+lookAhead
    );

    let blocked=false;

    upcoming.forEach(obs=>{
      const aiY = ai.yOffset;
      const obsY = obs.yOffset||0;
      if(Math.abs(aiY - obsY) < ai.height) blocked=true;
    });

    if(blocked){
      if(!ai.avoiding){
        ai.avoiding=true;
        const canUp = ai.yOffset > -maxOffset;
        const canDown = ai.yOffset < maxOffset;

        if(canUp && canDown){
          ai.dir = Math.random()<0.5?-1:1;
        } else if(canUp){
          ai.dir = -1;
        } else {
          ai.dir = 1;
        }
      }
      ai.yOffset += ai.dir*3;
    } else {
      ai.avoiding=false;
      if(ai.yOffset>1) ai.yOffset-=2;
      else if(ai.yOffset<-1) ai.yOffset+=2;
      ai.x+=ai.speed;
    }

    if(ai.yOffset>maxOffset) ai.yOffset=maxOffset;
    if(ai.yOffset<-maxOffset) ai.yOffset=-maxOffset;
  });
}

// COLLISION BLOCK
function blocked(x,lane,yOffset){
  return obstacles.some(o=>{
    return o.lane===lane &&
    Math.abs(o.x-x)<40 &&
    Math.abs((o.yOffset||0)-yOffset)<40;
  });
}

// GAME LOOP
function loop(){
  if(!gameStarted) return;

  if(!gamePaused){
    const time = ((Date.now()-startTime)/1000).toFixed(1);
    document.getElementById('timerBoard').innerText="Time: "+time;

    // PLAYER MOVE
    if(keys.ArrowUp) player.yOffset-=3;
    if(keys.ArrowDown) player.yOffset+=3;

    const maxOffset = laneHeight/2 - player.height/2;
    if(player.yOffset>maxOffset) player.yOffset=maxOffset;
    if(player.yOffset<-maxOffset) player.yOffset=-maxOffset;

    if(!blocked(player.x+player.speed, player.lane, player.yOffset)){
      player.x+=player.speed;
    }

    cameraX = player.x - 200;
    if(cameraX<0) cameraX=0;

    updateAI();

    // BLOCK HIT
    blocks.forEach((b,i)=>{
      if(Math.abs(b.x-player.x)<40){
        blocks.splice(i,1);
        askQuestion(()=>{});
      }
    });
  }

  ctx.clearRect(0,0,canvas.width,canvas.height);

  // LANES
  ctx.strokeStyle="white";
  for(let i=1;i<laneCount;i++){
    ctx.beginPath();
    ctx.moveTo(0,i*laneHeight);
    ctx.lineTo(canvas.width,i*laneHeight);
    ctx.stroke();
  }

  // OBSTACLES
  ctx.fillStyle="red";
  obstacles.forEach(o=>{
    ctx.fillRect(o.x-cameraX,
      o.lane*laneHeight+laneHeight/2+o.yOffset,
      o.width,o.height);
  });

  // BLOCKS
  ctx.fillStyle="yellow";
  blocks.forEach(b=>{
    ctx.fillRect(b.x-cameraX,
      b.lane*laneHeight+laneHeight/2,
      b.width,b.height);
  });

  // PLAYER
  ctx.fillStyle="red";
  ctx.fillRect(player.x-cameraX,
    player.lane*laneHeight+laneHeight/2+player.yOffset,
    player.width,player.height);

  // AI
  aiDrivers.forEach(ai=>{
    ctx.fillStyle="blue";
    ctx.fillRect(ai.x-cameraX,
      ai.lane*laneHeight+laneHeight/2+ai.yOffset,
      ai.width,ai.height);
  });

  // FINISH
  ctx.fillStyle="black";
  ctx.fillRect(trackLength-cameraX,0,20,canvas.height);

  if(player.x>=trackLength){
    const name = prompt("Enter name:");
    let scores = JSON.parse(localStorage.getItem("scores")||"[]");
    scores.push({name,time:(Date.now()-startTime)/1000});
    scores.sort((a,b)=>a.time-b.time);
    localStorage.setItem("scores",JSON.stringify(scores));
    alert("Finished!");
    location.reload();
  }

  requestAnimationFrame(loop);
}

// START
document.getElementById('startBtn').onclick=()=>{
  gameStarted=true;
  startTime=Date.now();
  document.getElementById('startScreen').style.display='none';
  document.getElementById('music').play();
  loop();
};
</script>

</body>
</html>
