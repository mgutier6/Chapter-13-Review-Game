<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🔥 Mario Stats Kart - Fixed Start</title>
<style>
body { margin:0; overflow:hidden; font-family:sans-serif; background:#87cefa; }
#timerBoard { position:absolute; top:10px; left:50%; transform:translateX(-50%); font-size:24px; background:rgba(255,255,255,0.8); padding:10px 20px; border-radius:12px; z-index:10;}
#questionPanel { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(255,255,255,0.95); padding:20px; border-radius:15px; display:none; z-index:20; max-width:500px; text-align:center;}
#questionPanel button { margin:5px; padding:10px 20px; font-size:16px; }
#startScreen { position:absolute; top:0; left:0; width:100%; height:100%; background:#333; color:white; display:flex; flex-direction:column; justify-content:center; align-items:center; font-size:48px; z-index:30; }
#startScreen button { font-size:32px; padding:15px 30px; margin-top:20px; cursor:pointer; }
#highScores { position:absolute; top:0; right:0; width:300px; background:rgba(255,255,255,0.9); padding:10px; border-radius:12px; z-index:10; max-height:80vh; overflow:auto;}
canvas { display:block; }
</style>
</head>
<body>

<div id="startScreen">
  Chapter 13 Review
  <button id="startButton">Start</button>
</div>

<div id="timerBoard">Time: 0s</div>
<div id="questionPanel">
  <div id="questionText"></div>
  <div id="answerButtons"></div>
</div>

<div id="highScores"><h3>High Scores</h3><ol id="scoreList"></ol></div>

<audio id="bgMusic" loop>
  <source src="background.mp3" type="audio/mpeg">
</audio>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let gamePaused = false;
let gameStarted = false;
let startTime, elapsedTime=0;
const baseSpeed = 3.5;

// Track & lanes
const trackLength = 20000;
const laneCount = 4;
const laneHeight = canvas.height / (laneCount + 1);
let cameraX = 0;

// Player
const player = {x:100, lane:1, yOffset:0, width:50, height:50, color:'red', speed:baseSpeed};

// AI drivers
const aiDrivers = [
  {lane:0, x:150, width:50, height:50, color:'blue', speed:baseSpeed, yOffset:0},
  {lane:2, x:200, width:50, height:50, color:'green', speed:baseSpeed, yOffset:0},
  {lane:3, x:250, width:50, height:50, color:'purple', speed:baseSpeed, yOffset:0}
];

// Questions (kept original, simplified here)
const questions = [
  {q:"Why do sample proportions vary?", a:"Random variability", options:["Random variability","Always same","Depends on n"]},
  {q:"Randomization Condition?", a:"Sample randomly selected", options:["Sample randomly selected","Population small","Sample>10%"]}
];

// Blocks (player lane only)
let blocks = [];
for(let i=0;i<questions.length*2;i++){ 
  blocks.push({x:500 + i*1200, lane:player.lane, width:50, height:50, hit:false, questionIndex:i % questions.length});
}

// Obstacles (for all lanes)
let obstacles = [];
for(let l=0;l<laneCount;l++){
  for(let i=0;i<25;i++){
    const obsX = 400 + i*600 + Math.random()*200;
    const obsY = (Math.random()* (laneHeight-50)) - (laneHeight/2-25);
    obstacles.push({x:obsX, lane:l, width:50, height:50, yOffset:obsY});
  }
}

// Controls
const keys = {};
window.addEventListener('keydown', e=>keys[e.key]=true);
window.addEventListener('keyup', e=>keys[e.key]=false);

// Timer
function updateTimer(){
  if(gameStarted && !gamePaused){
    elapsedTime = ((Date.now()-startTime)/1000).toFixed(2);
    document.getElementById('timerBoard').innerText = `Time: ${elapsedTime}s`;
  }
}

// Collision detection
function isColliding(a,b){ 
  const aY = a.lane*laneHeight + laneHeight/2 + (a.yOffset||0) - a.height/2;
  const bY = b.lane*laneHeight + laneHeight/2 + (b.yOffset||0) - b.height/2;
  return a.x < b.x + b.width && a.x + a.width > b.x && aY < bY + b.height && aY + a.height > bY;
}

// Question UI
const questionPanel = document.getElementById('questionPanel');
const questionText = document.getElementById('questionText');
const answerButtons = document.getElementById('answerButtons');

function askQuestion(block){
  gamePaused = true;
  const q = questions[block.questionIndex];
  questionText.innerText = q.q;
  answerButtons.innerHTML = '';
  q.options.forEach(opt=>{
    const btn = document.createElement('button');
    btn.innerText = opt;
    btn.onclick = ()=>{
      questionPanel.style.display='none';
      block.hit=true;
      gamePaused=false;
    }
    answerButtons.appendChild(btn);
  });
  questionPanel.style.display='block';
}

// Move player lane
function movePlayerLane(){
  const maxOffset = laneHeight/2 - player.height/2;
  if(keys['ArrowUp']) player.yOffset = Math.max(-maxOffset, player.yOffset - player.speed);
  if(keys['ArrowDown']) player.yOffset = Math.min(maxOffset, player.yOffset + player.speed);
}

// Draw lane lines
function drawLaneLines(){
  ctx.strokeStyle='white';
  ctx.lineWidth=2;
  for(let l=1;l<laneCount;l++){
    ctx.beginPath();
    ctx.moveTo(0, l*laneHeight);
    ctx.lineTo(canvas.width, l*laneHeight);
    ctx.stroke();
  }
}

// AI movement
function moveAI(ai){
  const maxOffset = laneHeight/2 - ai.height/2;
  let nextX = ai.x + ai.speed;
  const blocked = obstacles.some(obs=>obs.lane===ai.lane && isColliding({...ai,x:nextX}, obs));
  if(!blocked){
    ai.x = nextX;
  } else {
    if(ai.yOffset - ai.speed >= -maxOffset) ai.yOffset -= ai.speed;
    else if(ai.yOffset + ai.speed <= maxOffset) ai.yOffset += ai.speed;
  }
}

// Main loop
function loop(){
  if(!gameStarted) return;
  updateTimer();
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(!gamePaused){
    movePlayerLane();
    cameraX = player.x - 200;

    // Track background
    for(let i=0;i<trackLength;i+=100){
      ctx.fillStyle = (i%200===0) ? '#228B22' : '#32CD32';
      ctx.fillRect(i - cameraX, 0, 100, canvas.height);
    }

    drawLaneLines();

    // Draw obstacles
    obstacles.forEach(obs=>{
      ctx.fillStyle='brown';
      ctx.fillRect(obs.x - cameraX, obs.lane*laneHeight + laneHeight/2 + obs.yOffset - obs.height/2, obs.width, obs.height);
    });

    // Draw blocks
    blocks.forEach(block=>{
      if(!block.hit){
        ctx.fillStyle='gold';
        ctx.fillRect(block.x - cameraX, block.lane*laneHeight + laneHeight/2 - block.height/2, block.width, block.height);
        if(isColliding(player,block)) askQuestion(block);
      }
    });

    // Move & draw AI
    aiDrivers.forEach(ai=>{
      moveAI(ai);
      ctx.fillStyle=ai.color;
      ctx.fillRect(ai.x - cameraX, ai.lane*laneHeight + laneHeight/2 + ai.yOffset - ai.height/2, ai.width, ai.height);
    });

    // Move player forward
    let nextX = player.x + player.speed;
    if(!obstacles.some(obs=>obs.lane===player.lane && isColliding({...player,x:nextX}, obs))) player.x = nextX;

    // Draw player
    ctx.fillStyle=player.color;
    ctx.fillRect(player.x-cameraX, player.lane*laneHeight + laneHeight/2 + player.yOffset - player.height/2, player.width, player.height);

    // Finish
    if(player.x + player.width >= trackLength - 100) finalScreen();
  }

  requestAnimationFrame(loop);
}

// Finish
function finalScreen(){
  gamePaused = true;
  let name = prompt(`You finished in ${elapsedTime}s! Enter your name:`);
  if(name) saveHighScore(name, elapsedTime);
  location.reload();
}

// High Scores
function saveHighScore(name,time){
  let scores = JSON.parse(localStorage.getItem('highScores')||'[]');
  scores.push({name:name,time:parseFloat(time)});
  scores.sort((a,b)=>a.time-b.time);
  localStorage.setItem('highScores', JSON.stringify(scores));
  displayHighScores();
}

function displayHighScores(){
  const scoreList = document.getElementById('scoreList');
  scoreList.innerHTML='';
  const scores = JSON.parse(localStorage.getItem('highScores')||'[]');
  scores.forEach(s=>{
    const li = document.createElement('li');
    li.innerText = `${s.name}: ${s.time}s`;
    scoreList.appendChild(li);
  });
}

// Start button
document.getElementById('startButton').onclick = ()=>{
  document.getElementById('startScreen').style.display='none';
  gameStarted = true;
  startTime = Date.now();
  document.getElementById('bgMusic').play();
  loop();
  displayHighScores();
}
</script>
</body>
</html>
